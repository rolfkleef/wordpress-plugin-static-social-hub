name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Lint PHP syntax
        run: composer lint

      - name: Check coding standards
        run: composer cs

      - name: Run unit tests
        run: composer test:unit

  integration-tests:
    name: Integration Tests (PHP ${{ matrix.php }}, WP ${{ matrix.wp }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        wp: ['latest']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress_test
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Download WordPress ${{ matrix.wp }}
        run: |
          mkdir -p /tmp/wordpress
          if [ "${{ matrix.wp }}" = "latest" ]; then
            curl -s https://api.wordpress.org/core/version-check/1.7/ \
              | grep -o '"version":"[^"]*"' | head -1 | grep -o '[0-9.]*' > /tmp/wp-version.txt
            WP_VERSION=$(cat /tmp/wp-version.txt)
          else
            WP_VERSION="${{ matrix.wp }}"
          fi
          curl -s "https://wordpress.org/wordpress-${WP_VERSION}.tar.gz" \
            | tar -xz -C /tmp/wordpress --strip-components=1

      - name: Run integration tests
        env:
          WORDPRESS_DB_HOST: 127.0.0.1
          WORDPRESS_DB_USER: root
          WORDPRESS_DB_PASSWORD: ''
          WORDPRESS_DB_NAME: wordpress_test
          WP_ABSPATH: /tmp/wordpress
        run: composer test:integration
